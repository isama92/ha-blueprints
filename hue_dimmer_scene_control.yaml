blueprint:
  name: Hue Dimmer - Scene & Brightness Control
  description: >-
    Control a dimmable light (or group) with a Philips Hue Dimmer Switch
    (V1 or V2) paired via zigbee2mqtt. Supports both White Ambiance bulbs
    (via z2m scene_recall) and color bulbs (via HA light.turn_on).

    Behavior:
    - Top (On) button: toggle light on/off
    - Dim up (+): increase brightness by 10 percentage points
    - Dim down (-): decrease brightness by 10 percentage points
    - Bottom (Off) button: cycle through 5 scenes
      (concentrate → bright → relax → dimmed → nightlight → …)
      If no bottom-press for the timer's duration, cycle resets to concentrate.

    Two bulb modes:
    - 'white': sends z2m scene_recall to the group's MQTT topic (smooth,
      bulb-native transitions). Requires scenes pre-created via the
      sync_zigbee2mqtt_scenes script. Use for White Ambiance bulbs.
    - 'color': calls HA light.turn_on with explicit brightness/color_temp
      values. Works on any bulb including color bulbs where scene_recall
      is unreliable. Scene values hardcoded in this blueprint.
  domain: automation
  source_url: https://github.com/isama92/ha-blueprints/blob/main/hue_dimmer_scene_control.yaml
  input:
    dimmer_topic:
      name: Dimmer MQTT topic
      description: >-
        Full zigbee2mqtt topic for the dimmer, e.g. "zigbee2mqtt/office_dimmer".
      default: "zigbee2mqtt/"
      selector:
        text:
    light_target:
      name: Light or light group
      description: The light (or z2m group) this dimmer controls.
      selector:
        entity:
          domain: light
    scene_helper:
      name: Scene selector helper
      description: >-
        An input_select helper that tracks which scene is active.
        Must have options: concentrate, bright, relax, dimmed, nightlight.
      selector:
        entity:
          domain: input_select
    cycle_timer:
      name: Scene cycle reset timer
      description: >-
        A timer helper (duration e.g. 00:00:10). Restarted on every bottom-button
        press; when idle, the next press resets the cycle to the first scene.
      selector:
        entity:
          domain: timer
    bulb_type:
      name: Bulb type
      description: >-
        'white' uses z2m scene_recall (requires sync script to have created
        scenes on the bulbs). 'color' uses HA light.turn_on directly (reliable
        on color bulbs where scene_recall is flaky).
      default: white
      selector:
        select:
          options:
            - label: White Ambiance (scene_recall)
              value: white
            - label: Color (light.turn_on)
              value: color
    scene_topic:
      name: z2m scene topic base (white bulbs only)
      description: >-
        For 'white' bulb_type only. MQTT topic base for the group/bulb,
        e.g. "zigbee2mqtt/office_ceiling" (no /set suffix). Ignored for color.
      default: "zigbee2mqtt/"
      selector:
        text:

mode: restart
max_exceeded: silent

variables:
  scene_helper_entity: !input scene_helper
  cycle_timer_entity: !input cycle_timer
  scene_base_topic: !input scene_topic
  bulb_type_value: !input bulb_type
  # Scene ID mapping (for white bulbs via scene_recall)
  scene_ids:
    concentrate: 1
    bright: 2
    relax: 3
    dimmed: 4
    nightlight: 5
  # Scene values (for color bulbs via light.turn_on)
  scenes:
    concentrate:
      brightness_pct: 100
      color_temp_kelvin: 4291
    bright:
      brightness_pct: 100
      color_temp_kelvin: 2700
    relax:
      brightness_pct: 20
      color_temp_kelvin: 2237
    dimmed:
      brightness_pct: 25
      color_temp_kelvin: 2700
    nightlight:
      brightness_pct: 8
      color_temp_kelvin: 2700

trigger:
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: on_press
    id: top_toggle
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: up_press
    id: dim_up
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: down_press
    id: dim_down
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: off_press
    id: scene_cycle

action:
  - choose:
      # ── Top button: toggle ───────────────────────────────
      - conditions:
          - condition: trigger
            id: top_toggle
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_target

      # ── Dim up: +10% ─────────────────────────────────────
      - conditions:
          - condition: trigger
            id: dim_up
          - condition: state
            entity_id: !input light_target
            state: "on"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness_step_pct: 10
              transition: 0.3

      # ── Dim down: -10% ───────────────────────────────────
      - conditions:
          - condition: trigger
            id: dim_down
          - condition: state
            entity_id: !input light_target
            state: "on"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness_step_pct: -10
              transition: 0.3

      # ── Bottom button: cycle to next scene ───────────────
      - conditions:
          - condition: trigger
            id: scene_cycle
        sequence:
          - variables:
              scene_order:
                - concentrate
                - bright
                - relax
                - dimmed
                - nightlight
              current: "{{ states(scene_helper_entity) }}"
              timer_active: "{{ is_state(cycle_timer_entity, 'active') }}"
              next_scene: >-
                {% if not timer_active or current not in scene_order %}
                  concentrate
                {% else %}
                  {% set idx = scene_order.index(current) %}
                  {{ scene_order[(idx + 1) % (scene_order | count)] }}
                {% endif %}
          - service: timer.start
            target:
              entity_id: !input cycle_timer
          - service: input_select.select_option
            target:
              entity_id: !input scene_helper
            data:
              option: "{{ next_scene }}"
          - choose:
              # white bulbs → scene_recall
              - conditions:
                  - "{{ bulb_type_value == 'white' }}"
                sequence:
                  - service: mqtt.publish
                    data:
                      topic: "{{ scene_base_topic }}/set"
                      payload: >-
                        {"scene_recall": {{ scene_ids[next_scene] }}}
              # color bulbs → two-step light.turn_on to avoid green flash
              # (changing color and brightness together makes the xy path pass
              # through green; splitting into sequential steps avoids it)
              - conditions:
                  - "{{ bulb_type_value == 'color' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input light_target
                    data:
                      color_temp_kelvin: "{{ scenes[next_scene].color_temp_kelvin }}"
                      transition: 0.5
                  - delay: "00:00:00.5"
                  - service: light.turn_on
                    target:
                      entity_id: !input light_target
                    data:
                      brightness_pct: "{{ scenes[next_scene].brightness_pct }}"
                      transition: 0.5
