blueprint:
  name: Hue Dimmer - Scene & Brightness Control
  description: >-
    Control a dimmable light (or group) with a Philips Hue Dimmer Switch V2
    paired via zigbee2mqtt.

    Behavior:
    - Top (On) button: toggle light on/off (restores previous state)
    - Dim up (+): increase brightness by 10 percentage points
    - Dim down (-): decrease brightness by 10 percentage points
    - Bottom (Off) button: cycle through 5 scenes via z2m scene_recall
      (concentrate → bright → relax → dimmed → nightlight → concentrate …)
      If no bottom-press for the timer's duration, cycle resets to concentrate.

    Scenes must be pre-created on the z2m group/bulb using the
    sync_zigbee2mqtt_scenes script, with these IDs:
      1=concentrate, 2=bright, 3=relax, 4=dimmed, 5=nightlight

    Requires:
    - An input_select helper with options:
      concentrate, bright, relax, dimmed, nightlight
    - A timer helper (suggested duration: 10 seconds)
  domain: automation
  source_url: https://github.com/isama92/ha-blueprints/blob/main/hue_dimmer_scene_control.yaml
  input:
    dimmer_topic:
      name: Dimmer MQTT topic
      description: >-
        Full zigbee2mqtt topic for the dimmer, e.g. "zigbee2mqtt/office_dimmer".
      default: "zigbee2mqtt/"
      selector:
        text:
    light_target:
      name: Light or light group
      description: The light (or z2m group) this dimmer controls (used for toggle and dim +/-).
      selector:
        entity:
          domain: light
    scene_topic:
      name: z2m scene topic base
      description: >-
        MQTT topic base for the group/bulb that holds the scenes,
        e.g. "zigbee2mqtt/office_ceiling" (no /set suffix).
      default: "zigbee2mqtt/"
      selector:
        text:
    scene_helper:
      name: Scene selector helper
      description: >-
        An input_select helper that tracks which scene is active.
        Must have options: concentrate, bright, relax, dimmed, nightlight.
      selector:
        entity:
          domain: input_select
    cycle_timer:
      name: Scene cycle reset timer
      description: >-
        A timer helper (duration e.g. 00:00:10). Restarted on every bottom-button
        press; when idle, the next press resets the cycle to the first scene.
      selector:
        entity:
          domain: timer

mode: restart
max_exceeded: silent

variables:
  scene_helper_entity: !input scene_helper
  cycle_timer_entity: !input cycle_timer
  scene_base_topic: !input scene_topic
  # Scene name → z2m scene ID mapping (must match sync_zigbee2mqtt_scenes script)
  scene_ids:
    concentrate: 1
    bright: 2
    relax: 3
    dimmed: 4
    nightlight: 5

trigger:
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: on_press
    id: top_toggle
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: up_press
    id: dim_up
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: down_press
    id: dim_down
  - platform: mqtt
    topic: !input dimmer_topic
    value_template: "{{ value_json.action }}"
    payload: off_press
    id: scene_cycle

action:
  - choose:
      # ── Top button: toggle ───────────────────────────────
      - conditions:
          - condition: trigger
            id: top_toggle
        sequence:
          - service: light.toggle
            target:
              entity_id: !input light_target

      # ── Dim up: +10% ─────────────────────────────────────
      - conditions:
          - condition: trigger
            id: dim_up
          - condition: state
            entity_id: !input light_target
            state: "on"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness_step_pct: 10
              transition: 0.3

      # ── Dim down: -10% ───────────────────────────────────
      - conditions:
          - condition: trigger
            id: dim_down
          - condition: state
            entity_id: !input light_target
            state: "on"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness_step_pct: -10
              transition: 0.3

      # ── Bottom button: cycle to next scene via z2m scene_recall ───────
      - conditions:
          - condition: trigger
            id: scene_cycle
        sequence:
          - variables:
              scene_order:
                - concentrate
                - bright
                - relax
                - dimmed
                - nightlight
              current: "{{ states(scene_helper_entity) }}"
              timer_active: "{{ is_state(cycle_timer_entity, 'active') }}"
              next_scene: >-
                {% if not timer_active or current not in scene_order %}
                  concentrate
                {% else %}
                  {% set idx = scene_order.index(current) %}
                  {{ scene_order[(idx + 1) % (scene_order | count)] }}
                {% endif %}
              next_scene_id: "{{ scene_ids[next_scene] }}"
          - service: timer.start
            target:
              entity_id: !input cycle_timer
          - service: input_select.select_option
            target:
              entity_id: !input scene_helper
            data:
              option: "{{ next_scene }}"
          - service: mqtt.publish
            data:
              topic: "{{ scene_base_topic }}/set"
              payload: '{"scene_recall": {{ next_scene_id }}}'
